<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:system-ui,-apple-system,sans-serif}

.shaka-video-container{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:#000;
}


.shaka-volume-bar-container,
.shaka-spinner-container{display:none!important}

/* WATERMARK */
.custom-watermark{
    position:absolute;
    z-index:40;
    pointer-events:none;
    top:65%;
    left:6%;
    transform:translateY(-50%);
    font-size:11px;
    font-weight:600;
    color:rgba(255,255,255,0.15);
}

@media(max-width:700px){
    .custom-watermark{font-size:9px;top:60%;left:16%;}
}
</style>
</head>

<body>

<div class="shaka-video-container" id="player-container">
    <video id="video" autoplay playsinline preload="metadata"></video>
    <div class="custom-watermark">Dillzy Creations ™</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {

    shaka.polyfill.installAll();
    if(!shaka.Player.isBrowserSupported()) return;

    const videoEl = document.getElementById('video');
    const container = document.getElementById('player-container');
    const urlParams = new URLSearchParams(window.location.search);
    
    
    const requestedId = urlParams.get('id') || urlParams.get('channel');

    if(!requestedId){
        alert("?id=1984)");
        return;
    }

    let streamUrl = "";
    let drmConfig = { clearKeys: {} };
    let cookieHeader = "";

    try {
       
        const response = await fetch('https://allrounderid2.pages.dev/api/jiotv2.json', { cache: 'no-store' });
        const allChannels = await response.json();

       
        const channel = allChannels.find(ch => String(ch.channel_id) === String(requestedId));

        if(channel) {
            
            streamUrl = channel.channel_url;
            
            if(channel.keyId && channel.key) {
                drmConfig.clearKeys[channel.keyId.replace(/-/g, '')] = channel.key.replace(/-/g, '');
            }

            
            cookieHeader = channel.cookie;
            document.title = `${channel.channel_name || "Live"} - Sayan Official`;

        } else {
            alert("not found");
            return;
        }

    } catch(e) {
        console.error("Success", e);
    }

    const player = new shaka.Player();
    await player.attach(videoEl);
    const ui = new shaka.ui.Overlay(player, container, videoEl);

   
    ui.configure({
        controlPanelElements: ['play_pause', 'time_and_duration', 'spacer', 'language', 'captions', 'picture_in_picture', 'quality', 'fullscreen'],
        seekBarColors: {
            base: 'rgba(255,255,255,0.3)',
            buffered: 'rgba(255,255,255,0.5)',
            played: 'red'
        }
    });

    player.configure({
        drm: drmConfig,
        manifest: { defaultPresentationDelay: 5 },
        streaming: {
            safeSeekOffset: 5,
            bufferingGoal: 10,
            rebufferingGoal: 2,
            lowLatencyMode: true
        }
    });

    
    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.headers['Referer'] = 'https://www.jiotv.com/';
        request.headers['User-Agent'] = 'plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6';

        if(cookieHeader) {
            request.headers['Cookie'] = cookieHeader;

        
            if((type === shaka.net.NetworkingEngine.RequestType.MANIFEST || 
                type === shaka.net.NetworkingEngine.RequestType.SEGMENT) 
                && !request.uris[0].includes('__hdnea__')) {
                
                const sep = request.uris[0].includes('?') ? '&' : '?';
                request.uris[0] += sep + cookieHeader;
            }
        }
    });

    try {
        await player.load(streamUrl);
        videoEl.play();
    } catch(e) {
        console.error("স্ট্রিম লোড করতে সমস্যা হয়েছে", e);
    }
});
</script>

</body>  
</html>
