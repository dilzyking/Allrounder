  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI', Roboto, Helvetica, Arial, sans-serif}

    .shaka-video-container{
      position:fixed;
      inset:0;
      background:#000;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    video{
      width:100%;
      height:100%;
      object-fit:contain;
      background:#000;
    }

    .custom-watermark{
      position:absolute;
      z-index:40;
      pointer-events:none;
      top:65%;
      left:6%;
      transform: translateY(-50%);
      font-size:11px;
      font-weight:600;
      color: rgba(255, 255, 255, 0.12);
    }

    @media(max-width:700px){
      .custom-watermark{ font-size:9px; top:60%; left:16%; }
    }
  </style>
</head>
<body>

  <div class="shaka-video-container" id="player-container">
    <video id="video" autoplay playsinline preload="metadata"></video>
    <div class="custom-watermark"> </div>
  </div>

  <script>
    

  // ADD THIS BLOCK HERE (TOP MOST)
  async function isBraveBrowser() {
    return (navigator.brave && await navigator.brave.isBrave()) || false;
  }

  (async () => {
    const isBrave = await isBraveBrowser();

    if (isBrave) {
      const currentUrl = window.location.href;

      // Try auto open in Chrome (Android)
      window.location.href = "intent://" + currentUrl.replace(/^https?:\/\//, "") +
        "#Intent;scheme=https;package=com.android.chrome;end";

      // Fallback UI
      setTimeout(() => {
        document.body.innerHTML = `
          <div style="color:white;text-align:center;padding:20px;">
            <h2>Open in Chrome</h2>
            <p>This stream may not work in Brave browser.</p>
            <a href="${currentUrl}" style="color:yellow;font-size:18px;">
              Tap here to open in Chrome
            </a>
          </div>
        `;
      }, 2000);

      return; // ⛔ STOP player from loading in Brave
    }
  })();

  
    const CONFIG = {
      streamUrl: "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/output/index.mpd",
      keyId: "d0d750ebd52b5756aa7fb833f61ceece",
      key: "4ae62a20c030c918aad24193c1dda229",
manualCookie: "__hdnea__=st=1772330026~exp=1772416426~acl=/*~hmac=eb8fd2130793d6bffbf2a80f4557e20e9ab081bb65f0120a25d56552567e8864",
    };
    
      
    document.addEventListener('DOMContentLoaded', async () => {

      shaka.polyfill.installAll();
      if (!shaka.Player.isBrowserSupported()) return;

      const videoEl = document.getElementById('video');
      const container = document.getElementById('player-container');

      const player = new shaka.Player();
      await player.attach(videoEl);

      const ui = new shaka.ui.Overlay(player, container, videoEl);

      ui.configure({
        controlPanelElements: ['play_pause','time_and_duration','spacer','language','captions','picture_in_picture','quality','fullscreen'],
        seekBarColors: { base: 'white', buffered: 'red', played: 'green' }
      });

      player.configure({
        drm: { clearKeys: { [CONFIG.keyId]: CONFIG.key } },
        manifest: { defaultPresentationDelay: 5 },
        streaming: { safeSeekOffset: 5, bufferingGoal: 10, rebufferingGoal: 2, lowLatencyMode: true }
      });

      player.getNetworkingEngine().registerRequestFilter((type, request) => {

        request.headers['Referer'] = 'https://www.jiotv.com/';
        request.headers['User-Agent'] = 'plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6';

        if (CONFIG.manualCookie && CONFIG.manualCookie !== "PUT_YOUR_COOKIE_HERE") {

          request.headers['Cookie'] = CONFIG.manualCookie;

          if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST ||
               type === shaka.net.NetworkingEngine.RequestType.SEGMENT) &&
               !request.uris[0].includes('__hdnea__')) {

            const sep = request.uris[0].includes('?') ? '&' : '?';
            request.uris[0] += sep + CONFIG.manualCookie;
          }
        }
      });

      try {
        await player.load(CONFIG.streamUrl);
        videoEl.play();
      } catch (e) {
        console.error("Stream Load Error:", e);
      }
    });
  </script>

</body>
</html>
