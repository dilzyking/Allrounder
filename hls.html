<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KARTAVYA Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#000;
}
#video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:#000;
}
</style>
</head>
<body>

<video id="video" controls autoplay playsinline></video>

<script>
const streamUrl =
"https://net52.cc/hls/82698051.m3u8?q=720p&in=1d271bbf29e99c439ce1e038a807604b::c9f0cb400c116c40b564ec9c9f3202d5::1780960462::ni::p::3c7de1e946dd7932bdf8172fd9370783";

const video = document.getElementById("video");

if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(streamUrl);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play();
    });
} else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = streamUrl;
    video.play();
}
</script>

</body>
</html>
