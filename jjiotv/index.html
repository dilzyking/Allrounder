<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JioTV Home</title>

<style>
body{
margin:0;
background:#000;
font-family:system-ui;
color:#fff;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
padding:15px;
}
.card{
background:#111;
border-radius:10px;
overflow:hidden;
cursor:pointer;
border:1px solid #222;
}
.card img{
width:100%;
height:120px;
object-fit:contain;
background:#000;
}
.name{
padding:10px;
font-size:14px;
text-align:center;
}
</style>
</head>
<body>

<div class="grid" id="grid"></div>

<script>
const API = "https://allrounderid2.pages.dev/api/jiotv2.json";

fetch(API)
.then(res => res.json())
.then(data => {

const grid = document.getElementById("grid");

data.forEach(channel => {

const card = document.createElement("div");
card.className = "card";

card.onclick = () => {
window.location.href = "player.html?id=" + channel.channel_id;
};

card.innerHTML = `
<img src="${channel.channel_logo}">
<div class="name">${channel.channel_name}</div>
`;

grid.appendChild(card);

});

});
</script>

</body>
</html>
