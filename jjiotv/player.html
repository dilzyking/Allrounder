<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Allrounder</title>
<meta name="referrer" content="no-referrer">

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:system-ui}

.shaka-video-container{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:#000;
}

.shaka-spinner-container{display:none!important}

.shaka-big-play-button{
background:rgba(255,255,255,0.15)!important;
backdrop-filter:blur(6px);
width:80px!important;
height:80px!important;
border-radius:50%!important;
}

.custom-watermark{
position:absolute;
z-index:40;
pointer-events:none;
top:65%;
left:6%;
transform:translateY(-50%);
font-size:11px;
font-weight:600;
color:rgba(255,255,255,0.12);
}

@media(max-width:700px){
.custom-watermark{font-size:9px;top:60%;left:16%}
}
</style>
</head>
<body>

<div class="shaka-video-container" id="player-container">
<video id="video" playsinline></video>
<div class="custom-watermark"></div>
</div>

<script>
const CONFIG={
api:"https://allrounderid2.pages.dev/api/jiotv2.json"
};

function getParam(name){
return new URLSearchParams(window.location.search).get(name);
}

async function initPlayer(){

shaka.polyfill.installAll();
if(!shaka.Player.isBrowserSupported()) return;

const video=document.getElementById('video');
const container=document.getElementById('player-container');

video.muted=false; // sound enabled by default
video.volume=1;

const player=new shaka.Player(video);
const ui=new shaka.ui.Overlay(player,container,video);

ui.configure({
controlPanelElements:[
'play_pause',
'time_and_duration',
'spacer',
'mute',
'volume',
'quality',
'picture_in_picture',
'fullscreen'
],
seekBarColors:{
base:'white',
buffered:'red',
played:'yellow'
}
});

player.configure({
streaming:{
lowLatencyMode:true,
inaccurateManifestTolerance:0,
rebufferingGoal:1,
bufferingGoal:5,
jumpLargeGaps:true
},
manifest:{
retryParameters:{maxAttempts:4}
}
});

try{

const targetId=getParam('id');
if(!targetId) return;

const response=await fetch(CONFIG.api);
const data=await response.json();
const channel=data.find(c=>c.channel_id===targetId);
if(!channel) return;

player.configure({
drm:{
clearKeys:{[channel.keyId]:channel.key}
}
});

player.getNetworkingEngine().registerRequestFilter((type,request)=>{
request.headers['Referer']='https://www.jiotv.com/';
request.headers['User-Agent']='plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6';

if(channel.cookie){
request.headers['Cookie']=channel.cookie;
if(!request.uris[0].includes('__hdnea__')){
const sep=request.uris[0].includes('?')?'&':'?';
request.uris[0]+=sep+channel.cookie;
}
}
});

await player.load(channel.channel_url);

video.addEventListener('play',()=>{
if(player.isLive()){
const livePoint=player.seekRange().end;
video.currentTime=livePoint;
}
});

}catch(e){
console.error("Player Load Error:",e);
}
}

document.addEventListener('shaka-ui-loaded',initPlayer);
document.addEventListener('DOMContentLoaded',()=>{
if(!window.shaka) initPlayer();
});
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
</script>

</body>
<script>(function(s){s.dataset.zone='10603308',s.src='https://bvtpk.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
  
</html>
